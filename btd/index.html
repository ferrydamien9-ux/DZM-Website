<!DOCTYPE html>
<html>
<head>
    <title>Bloons Ultimate Collection</title>
    <style>
        body { 
            background: #000; color: #fff; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        nav { background: #222; padding: 10px; display: flex; justify-content: center; gap: 8px; z-index: 10; }
        button { padding: 8px 12px; cursor: pointer; background: #444; color: #fff; border: 1px solid #666; font-weight: bold; border-radius: 4px; }
        button:hover { background: #f2b01e; color: #000; }
        
        #game-container { flex-grow: 1; width: 100vw; height: calc(100vh - 55px); position: relative; }
        ruffle-player { width: 100% !important; height: 100% !important; display: block; }
    </style>
</head>
<body>
    <nav id="game-nav">
        <button onclick="loadGame('bloonstd.swf')">BTD 1</button>
        <button onclick="loadGame('bloonstd2.swf')">BTD 2</button>
        <button onclick="loadGame('bloonstd3.swf')">BTD 3</button>
        <button onclick="loadGame('bloonstd4.swf')">BTD 4</button>
        <button onclick="loadGame('bloonstd4exp.swf')">BTD 4 EXP</button>
    </nav>
    <div id="game-container"></div>

    <script src="ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "letterbox": "on", 
            "autoplay": "on",
            "unmuteOverlay": "hidden",
            "scale": "showAll"
        };

        const ruffle = window.RufflePlayer.newest();
        const container = document.getElementById("game-container");
        let player;

        function loadGame(file) {
            container.innerHTML = "";
            player = ruffle.createPlayer();
            container.appendChild(player);
            
            // Forces Ruffle to find the file exactly where index.html lives
            player.load({ url: file }); 
        }

        window.onload = () => {
            if (typeof ruffle !== "undefined" && ruffle !== null) {
                loadGame('bloonstd.swf');
            } else {
                container.innerHTML = "<p style='text-align:center; padding-top:50px; color:red;'>Error: ruffle.js file could not be read. Check your folder!</p>";
            }
        };
    </script>
</body>
</html>
